          url: https://iiif.ghentcdh.ugent.be/iiif/collections/primitief_kadaster
        description: |
          Het 'primitief kadaster' is de eerste systematische inventarisatie van
          alle Belgische percelen, gronden en gebouwen, aangelegd met het oog op een
          rechtvaardige grondbelasting. De opmaak startte omstreeks 1800 onder Frans
          bewind en werd voor het grootste deel van België bekrachtigd in 1834; voor
          Limburg en Luxemburg pas in 1844. De collectie omvat ruim 23.000
          kadastrale plannen en meer dan 61.000 processen-verbaal van
          gemeentegrensafpalingen. Digitaal raadpleegbaar via het Rijksarchief
          (search.arch.be) en geografisch via cartesius.be.
