<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%E2%97%88%3C/text%3E%3C/svg%3E" />
		<!-- Self-hosted latin subsets (~32 KB total) replace the render-blocking Google Fonts
		     stylesheet: no third-party round-trip before first paint, and the faces live in the
		     app's own cache scope. Inline @font-face (rather than app.css) so discovery happens
		     during HTML parse and %sveltekit.assets% keeps the URLs base-path-safe. -->
		<link rel="preload" href="%sveltekit.assets%/fonts/space-mono-400-latin.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="%sveltekit.assets%/fonts/space-grotesk-400-latin.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="%sveltekit.assets%/fonts/space-mono-700-latin.woff2" as="font" type="font/woff2" crossorigin />
		<style>
			@font-face {
				font-family: 'Space Grotesk';
				font-style: normal;
				font-weight: 400;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/space-grotesk-400-latin.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Space Mono';
				font-style: normal;
				font-weight: 400;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/space-mono-400-latin.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Space Mono';
				font-style: normal;
				font-weight: 700;
				font-display: swap;
				src: url('%sveltekit.assets%/fonts/space-mono-700-latin.woff2') format('woff2');
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
