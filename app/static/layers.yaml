        description: |
          De Cartes topographiques de la Belgique van Philippe Vandermaelen
          (1795–1869), oprichter van het Établissement géographique de Bruxelles.
          Hij publiceerde 250 kaartbladen op schaal 1:20.000 (1846–1854); de kaart
          geldt als de opvolger van de Ferrariskaart en verscheen lang vóór de
          officiële stafkaarten van het Krijgsdepot. Bij de sluiting van het
          Établissement in 1880 verwierf de KBR de volledige collectie. Digitaal
          beschikbaar via geopunt.be.
        attribution:
          credit: Koninklijke Bibliotheek van België (KBR) — via geopunt.be (Digitaal Vlaanderen)
