name: Release

on:
  workflow_run:
    workflows: [Deploy to GitHub Pages]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Derive the next version from the latest git tag, not app/package.json.
          # package.json's version can't be bumped back onto main (main is PR-only,
          # so this workflow has no way to push a bump commit), so basing it on the
          # tag this same job creates keeps numbering self-consistent and unique.
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_PATCH=$((PATCH + 1))
          echo "next=$MAJOR.$MINOR.$NEW_PATCH" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get all commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"%h %s")
          else
            COMMITS=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"%h %s")
          fi

          # Parse conventional commits into changelog
          CHANGELOG=$(echo "$COMMITS" | awk '
            BEGIN { feat=""; fix=""; breaking="" }
            /^[a-f0-9]+ feat(\(.+\))?:/ { feat = feat "\n- " substr($0, index($0, $2)) }
            /^[a-f0-9]+ fix(\(.+\))?:/ { fix = fix "\n- " substr($0, index($0, $2)) }
            /BREAKING CHANGE/ { breaking = breaking "\n- " substr($0, index($0, $2)) }
            END {
              if (breaking != "") print "### 🚨 Breaking Changes" breaking
              if (feat != "") print "### ✨ Features" feat
              if (fix != "") print "### 🐛 Bug Fixes" fix
            }
          ')

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ steps.version.outputs.next }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes "$RELEASE_BODY"
