        description: |
          De Carte des Pays-Bas et des frontières de France van Eugène-Henri Fricx
          (1644–1730), Brusselse boekhandelaar en drukker. De eerste editie verscheen
          in 1712, toen 23 van de 24 topografische kaartbladen van de Zuidelijke
          Nederlanden klaar waren; het 24e blad (Luxemburg) volgde pas in 1727. De
          digitale ontsluiting voor Vlaanderen kwam tot stand via KBR en AGIV (nu
          Digitaal Vlaanderen). Raadpleegbaar via geopunt.be.
        attribution:
          credit: Koninklijke Bibliotheek van België (KBR) — via geopunt.be (Digitaal Vlaanderen)
          logos:
            - file: logo_KRB.png
              href: https://www.kbr.be
              src: attribution-logos/logo_KRB.png
          rights: https://www.geopunt.be/gebruiksvoorwaarden
        citation: Fricx, E.-H. (1712). Carte des Pays-Bas et des frontières de France [Map]. Koninklijke Bibliotheek van België (KBR). https://www.geopunt.be
