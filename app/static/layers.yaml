    sublayers:
      - id: Ferraris-wmts
        name: Map
        kind: wmts
        source:
          type: remote
          url: https://geo.api.vlaanderen.be/HISTCART/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=ferraris&STYLE=&FORMAT=image/png&TILEMATRIXSET=GoogleMapsVL&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}
        description: |
          De Kabinetskaart der Oostenrijkse Nederlanden en het Prinsbisdom Luik,
          opgesteld tussen 1771 en 1778 in opdracht van keizerin Maria Theresia en
          keizer Jozef II, onder leiding van generaal Joseph-Jean-François graaf de
          Ferraris (1726–1814). Met 275 handgetekende en ingekleurde kaartbladen op
          schaal 1:11.520 is dit de eerste systematische en grootschalige
          topografische kartering van wat nu België is. Het KBR-exemplaar in Brussel
          is gedigitaliseerd en via geopunt.be raadpleegbaar.
        attribution:
          credit: Koninklijke Bibliotheek van België (KBR) — via geopunt.be (Digitaal Vlaanderen)
          logos:
            - file: logo_KRB.png
              href: https://www.kbr.be
              src: attribution-logos/logo_KRB.png
          rights: https://www.geopunt.be/gebruiksvoorwaarden
        citation: de Ferraris, J.-J.-F. (1777). Kabinetskaart der Oostenrijkse Nederlanden en het Prinsbisdom Luik [Map]. Koninklijke Bibliotheek van België (KBR). https://www.geopunt.be
      - id: Ferraris-landusage
        name: Land usage
        kind: wms
        source:
          type: remote
          url: https://geo.api.vlaanderen.be/INBO/wms?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0&LAYERS=Lgbrk1778&STYLES=&FORMAT=image%2Fpng&TRANSPARENT=TRUE&CRS=EPSG%3A3857&BBOX={bbox-epsg-3857}&WIDTH=256&HEIGHT=256
        description: |
          Gereconstrueerd historisch landgebruik omstreeks 1778, afgeleid van de
          Ferrariskaart door het Instituut voor Natuur- en Bosonderzoek (INBO).
          Een gekleurde indexlaag die het pre-industriële landgebruik (akker, bos,
          grasland, bebouwing, water) classificeert.
        attribution:
          credit: Instituut voor Natuur- en Bosonderzoek (INBO)
          logos: []
          rights: https://www.geopunt.be/gebruiksvoorwaarden
        citation: Instituut voor Natuur- en Bosonderzoek (INBO). (n.d.). Historisch landgebruik naar de Ferrariskaart (Lgbrk1778) [Data set]. INBO. https://www.vlaanderen.be/inbo
